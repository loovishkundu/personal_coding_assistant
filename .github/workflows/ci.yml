# Lint gate + tests. No secrets anywhere in this workflow: PCA talks only to
# a local LLM server, and the tests use a mock transport.
#
# Actions are SHA-pinned (tag in the comment) so a compromised upstream tag
# cannot run arbitrary code here. Bump by resolving the new tag's commit SHA.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install
        run: uv sync
      - name: isort
        run: uv run isort --check-only .
      - name: black
        run: uv run black --check .
      - name: ruff
        run: uv run ruff check .
      - name: tests
        run: uv run pytest -q
